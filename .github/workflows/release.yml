name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v1.0.1"
        required: true
        type: string
      prerelease:
        description: "Mark this release as pre-release"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-release:
    name: Build and publish release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install Playwright Chromium
        shell: pwsh
        run: python -m playwright install chromium

      - name: Build exe package
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\build_exe.ps1 -SkipInstall -SkipSmokeTest

      - name: Validate release zip
        shell: pwsh
        run: |
          $zip = "dist\TemplateAutomationTool.zip"
          if (-not (Test-Path -LiteralPath $zip)) {
            throw "Release zip not found: $zip"
          }

          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $archive = [System.IO.Compression.ZipFile]::OpenRead((Resolve-Path $zip))
          try {
            $names = $archive.Entries.FullName | ForEach-Object { $_ -replace '\\', '/' }
            if (-not ($names -contains "TemplateAutomationTool/TemplateAutomationTool.exe")) {
              throw "Zip missing TemplateAutomationTool.exe"
            }
            if (-not ($names -contains "TemplateAutomationTool/_internal/config/partners.yaml")) {
              throw "Zip missing partners.yaml"
            }
            if (-not ($names | Where-Object { $_ -like "TemplateAutomationTool/_internal/ms-playwright/*/chrome-win/chrome.exe" } | Select-Object -First 1)) {
              throw "Zip missing bundled Chromium"
            }
          }
          finally {
            $archive.Dispose()
          }

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          $notes = @"
          ## Internal Release

          Packaged Windows release for Template Automation Tool.

          ### Usage
          Download `TemplateAutomationTool.zip`, unzip the full folder, then run `TemplateAutomationTool.exe`.

          Do not download the auto-generated source code zip unless you need the source project.
          "@

          $ghArgs = @(
            "release", "create", $env:VERSION,
            "dist\TemplateAutomationTool.zip",
            "--title", "Template Automation Tool $env:VERSION",
            "--notes", $notes
          )

          if ($env:PRERELEASE -eq "true") {
            $ghArgs += "--prerelease"
          }

          gh @ghArgs
